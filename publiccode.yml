description:
  en:
    localisedName: jeap-opensearch-index-type
    shortDescription: Core domain model defining IndexType and SearchItem contracts for jEAP OpenSearch infrastructure
    longDescription: >
      jeap-opensearch-index-type defines the core contracts and data structures shared by jEAP OpenSearch index writers,
      search clients, and the index type registry Maven plugin.
      It provides the IndexType<T> and IndexTypeDescriptor interfaces that describe versioned OpenSearch indices,
      carrying origin type, major and minor version, write and read aliases, mapping definitions, typed data classes,
      and role-based access control declarations.
      The library also defines SearchItem (the read model), SearchItemIndexed (the write model enriched with
      SearchItemMetadata), and Origin (business object metadata including id, version, tenant, and timestamps).
      All types are immutable records with zero infrastructure dependencies — only Jackson for JSON serialization.
    features:
      - IndexType<T> and IndexTypeDescriptor interfaces for versioned OpenSearch index descriptions
      - SearchItem read model and SearchItemIndexed write model
      - Origin business object metadata record
      - Zero infrastructure dependencies — pure domain model
